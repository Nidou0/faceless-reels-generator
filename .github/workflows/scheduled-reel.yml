name: Scheduled Reel Generation

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache pip + Whisper model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/whisper
          key: ${{ runner.os }}-pip-whisper-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore YouTube credentials
        run: |
          mkdir -p data
          echo "${{ secrets.YOUTUBE_CLIENT_SECRET_B64 }}" | base64 -d > data/youtube_client_secret.json
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > data/youtube_token.json

      - name: Generate and post one reel
        run: python scheduled_run.py

      - name: Persist updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedule_state.json data/history.json data/curated data/sourced
          git diff --cached --quiet || git commit -m "Update schedule state [skip ci]"
          git push
